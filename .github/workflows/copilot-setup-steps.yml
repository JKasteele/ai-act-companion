# Pre-installs the project's dependencies in the GitHub Copilot cloud agent's
# ephemeral environment (coding agent / Cowork) so it can run the engine, the
# MCP server, the tests and the linters without trial-and-error installs.
#
# Requirements (GitHub Docs): the file must live on the default branch and
# contain a single job named exactly `copilot-setup-steps`.
name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  # Validate this workflow when it changes.
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install the engine, MCP server and dev tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mcp]"

      - name: Sanity-check the engine and MCP entrypoint import
        run: |
          python -c "import app.classifier, app.security, app.reports, mcp_server"
